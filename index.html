<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND-MAID · Ad Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&family=Jura:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --surface2: #181818;
    --border:   #2a2a2a;
    --gold:     #c8a96e;
    --gold2:    #e8c98e;
    --goldDim:  #8a6e3e;
    --text:     #e8e0d0;
    --textDim:  #7a7060;
    --textMid:  #a89880;
    --blue:     #4a8fa8;
    --green:    #4a8a5a;
    --accent:   #c8a96e;
    --red:      #a85a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    background: linear-gradient(180deg, #0d0d0d 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .site-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .2em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .site-sub {
    font-family: 'Jura', sans-serif;
    font-size: .72rem;
    letter-spacing: .18em;
    color: var(--textDim);
    text-transform: uppercase;
  }
  .header-count {
    margin-left: auto;
    font-family: 'Jura', sans-serif;
    font-size: .72rem;
    color: var(--textDim);
    letter-spacing: .1em;
  }

  /* ── FILTERS ── */
  .filters {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--surface);
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-label {
    font-family: 'Jura', sans-serif;
    font-size: .68rem;
    letter-spacing: .14em;
    color: var(--textDim);
    text-transform: uppercase;
    white-space: nowrap;
  }
  select, input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: .8rem;
    padding: 5px 10px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  select:hover, input[type=text]:hover { border-color: var(--goldDim); }
  select:focus, input[type=text]:focus { border-color: var(--gold); }
  input[type=text] { min-width: 160px; }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--textDim);
    font-family: 'Jura', sans-serif;
    font-size: .68rem;
    letter-spacing: .1em;
    padding: 5px 12px;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .2s;
  }
  .btn-clear:hover { border-color: var(--gold); color: var(--gold); }

  /* ── MAIN ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── AD CARD ── */
  .ad-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color .25s;
    animation: fadeIn .35s ease both;
  }
  .ad-card:hover { border-color: var(--goldDim); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* card header bar */
  .card-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: #1e1e1e; }
  .advertiser-badge {
    font-family: 'Jura', sans-serif;
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .badge-maidit  { background: #1a130a; color: var(--gold); border: 1px solid #3a2a0e; }
  .badge-pony    { background: #0a0e1a; color: #8aafcf; border: 1px solid #1a2a3a; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    align-items: center;
  }
  .meta-item {
    font-family: 'Jura', sans-serif;
    font-size: .7rem;
    color: var(--textDim);
    letter-spacing: .08em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meta-item span { color: var(--textMid); }
  .meta-item .days {
    color: var(--gold);
    font-weight: 500;
  }
  .creative-id {
    font-family: 'Jura', sans-serif;
    font-size: .65rem;
    color: var(--textDim);
    letter-spacing: .06em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }
  .toggle-icon {
    color: var(--textDim);
    font-size: .9rem;
    transition: transform .25s;
  }
  .ad-card.expanded .toggle-icon { transform: rotate(180deg); }

  /* card body */
  .card-body {
    display: none;
    padding: 20px;
    gap: 20px;
  }
  .ad-card.expanded .card-body { display: flex; flex-wrap: wrap; }

  /* ── CREATIVES SECTION ── */
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: .65rem;
    letter-spacing: .2em;
    color: var(--goldDim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .creatives-section { flex: 1 1 420px; min-width: 0; }
  .creatives-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .creative-item {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px;
    transition: border-color .2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .creative-item:hover { border-color: var(--goldDim); }
  .thumb-wrap {
    position: relative;
    width: 90px;
    aspect-ratio: 16/9;
    flex-shrink: 0;
    background: #000;
    border-radius: 2px;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-duration {
    position: absolute;
    bottom: 3px;
    right: 4px;
    background: rgba(0,0,0,.85);
    color: #fff;
    font-family: 'Jura', sans-serif;
    font-size: .6rem;
    padding: 1px 4px;
    border-radius: 1px;
    letter-spacing: .04em;
  }
  .creative-info { min-width: 0; }
  .creative-title {
    font-size: .8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.35;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .creative-row {
    display: flex;
    flex-wrap: wrap;
    gap: 3px 10px;
    margin-top: 4px;
  }
  .creative-tag {
    font-family: 'Jura', sans-serif;
    font-size: .65rem;
    color: var(--textDim);
    letter-spacing: .06em;
  }
  .creative-tag .val { color: var(--textMid); }
  .creative-tag .views-val { color: var(--gold); }
  .creative-cta {
    display: inline-block;
    margin-top: 5px;
    font-family: 'Jura', sans-serif;
    font-size: .62rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--goldDim);
    padding: 2px 7px;
    border-radius: 1px;
  }
  .dedup-badge {
    font-family: 'Jura', sans-serif;
    font-size: .6rem;
    color: var(--textDim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 1px;
    margin-top: 4px;
    display: inline-block;
  }

  /* ── REGIONS SECTION ── */
  .regions-section { flex: 1 1 300px; min-width: 0; }
  .regions-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .region-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: .78rem;
  }
  .region-name {
    color: var(--text);
    font-weight: 500;
  }
  .region-dates {
    font-family: 'Jura', sans-serif;
    font-size: .67rem;
    color: var(--textDim);
    text-align: right;
    white-space: nowrap;
  }
  .region-dates .one-day { color: var(--textDim); font-style: italic; }
  .region-impressions {
    font-family: 'Jura', sans-serif;
    font-size: .65rem;
    color: var(--gold);
    background: #1a130a;
    border: 1px solid #3a2a0e;
    padding: 1px 6px;
    border-radius: 1px;
    white-space: nowrap;
    letter-spacing: .04em;
  }
  .region-impressions-placeholder { width: 1px; }

  /* ── LINKS ROW ── */
  .card-links {
    width: 100%;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .card-link {
    font-family: 'Jura', sans-serif;
    font-size: .68rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--textDim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all .2s;
  }
  .card-link:hover { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--textDim);
    font-family: 'Jura', sans-serif;
    letter-spacing: .1em;
    font-size: .85rem;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--textDim);
    font-family: 'Jura', sans-serif;
    letter-spacing: .12em;
    font-size: .85rem;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STAT BAR ── */
  .stat-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 24px;
    padding: 10px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .stat-item {
    font-family: 'Jura', sans-serif;
    font-size: .68rem;
    color: var(--textDim);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .stat-item .sv { color: var(--gold); font-size: .8rem; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    header { padding: 16px; flex-wrap: wrap; }
    .filters { padding: 12px 16px; }
    main { padding: 16px; }
    .card-body { padding: 14px; }
    .creative-item { grid-template-columns: 70px 1fr; }
    .thumb-wrap { width: 70px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title">BAND-MAID</div>
    <div class="site-sub">Ad Archive · Google Ads Transparency</div>
  </div>
  <div class="header-count" id="headerCount">Loading…</div>
</header>

<div class="stat-bar" id="statBar"></div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Advertiser</span>
    <select id="fAdvertiser"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Region</span>
    <select id="fRegion"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Creative</span>
    <select id="fCreative"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Search</span>
    <input type="text" id="fSearch" placeholder="title, headline, snippet…">
  </div>
  <button class="btn-clear" id="btnClear">Clear</button>
</div>

<main id="main">
  <div class="loading">Loading ad data</div>
</main>

<script>
const DATA_URL = 'https://drivetimebm.github.io/BAND-MAID_ads/ads.json';

// ── helpers ──────────────────────────────────────────────────────────────
function fmtTs(ts) {
  // unix seconds
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function fmtRegDate(n) {
  // YYYYMMDD integer
  if (!n) return null;
  const s = String(n);
  const y = s.slice(0,4), m = s.slice(4,6), d = s.slice(6,8);
  const dt = new Date(`${y}-${m}-${d}`);
  return dt.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function thumbUrl(videoId) {
  return videoId ? `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg` : null;
}

function fmtViews(n) {
  if (!n) return '';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1_000)     return (n/1_000).toFixed(1).replace(/\.0$/,'') + 'K';
  return String(n);
}

function advertiserShort(a) {
  if (!a) return '';
  if (a.includes('MAIDIT'))    return 'MAIDIT';
  if (a.includes('Pony'))      return 'Pony Canyon';
  return a.split('[')[0].trim();
}

function advertiserClass(a) {
  if (!a) return '';
  if (a.includes('MAIDIT')) return 'badge-maidit';
  return 'badge-pony';
}

// Deduplicate ad_creatives: skip duplicates of same VideoId that only differ by embed vs direct
function dedupeCreatives(creatives) {
  if (!creatives) return [];
  const seen = new Map();
  const out = [];
  for (const c of creatives) {
    const vid = c.VideoId || c.link || '';
    // prefer the direct video_link (non-embed) entries; embed entries have height/width
    if (!seen.has(vid)) {
      seen.set(vid, c);
      out.push({ ...c, _isFirst: true });
    } else {
      // merge: pick whichever has more fields
      const existing = seen.get(vid);
      if (!existing.headline && c.headline) existing.headline = c.headline;
      if (!existing.call_to_action && c.call_to_action) existing.call_to_action = c.call_to_action;
      if (!existing.snippet && c.snippet) existing.snippet = c.snippet;
      if (!existing.channel_name && c.channel_name) existing.channel_name = c.channel_name;
    }
  }
  return out;
}

// ── state ────────────────────────────────────────────────────────────────
let allAds = [];
let filtered = [];

const fAdvertiser = document.getElementById('fAdvertiser');
const fRegion     = document.getElementById('fRegion');
const fCreative   = document.getElementById('fCreative');
const fSearch     = document.getElementById('fSearch');
const btnClear    = document.getElementById('btnClear');
const mainEl      = document.getElementById('main');
const headerCount = document.getElementById('headerCount');
const statBar     = document.getElementById('statBar');

// ── filter & render ──────────────────────────────────────────────────────
function applyFilters() {
  const adv  = fAdvertiser.value;
  const reg  = fRegion.value;
  const cre  = fCreative.value;
  const q    = fSearch.value.toLowerCase();

  filtered = allAds.filter(ad => {
    if (adv && ad.advertiser_id !== adv) return false;
    if (cre && ad.ad_creative_id !== cre) return false;
    if (reg) {
      const regions = ad.AdDetails?.search_information?.regions || [];
      if (!regions.some(r => r.region_name === reg)) return false;
    }
    if (q) {
      const blob = [
        ad.advertiser,
        ad.ad_creative_id,
        ...(ad.AdDetails?.ad_creatives || []).map(c => [c.VideoTitle, c.headline, c.snippet, c.call_to_action].join(' '))
      ].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  renderCards();
  updateCount();
}

function updateCount() {
  headerCount.textContent = `${filtered.length} of ${allAds.length} creatives`;
}

function renderCards() {
  if (filtered.length === 0) {
    mainEl.innerHTML = '<div class="empty">No ads match the current filters</div>';
    return;
  }

  mainEl.innerHTML = '';
  filtered.forEach((ad, i) => {
    const card = buildCard(ad, i);
    mainEl.appendChild(card);
  });
}

function buildCard(ad, idx) {
  const regions  = ad.AdDetails?.search_information?.regions || [];
  const creatives = dedupeCreatives(ad.AdDetails?.ad_creatives || []);

  const firstShown = fmtTs(ad.first_shown);
  const lastShown  = fmtTs(ad.last_shown);

  const card = document.createElement('div');
  card.className = 'ad-card';
  card.style.animationDelay = `${idx * 40}ms`;

  // ── header ──
  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `
    <span class="advertiser-badge ${advertiserClass(ad.advertiser)}">${advertiserShort(ad.advertiser)}</span>
    <div class="card-meta">
      <span class="meta-item">Days shown: <span class="days">${ad.total_days_shown}</span></span>
      <span class="meta-item">First: <span>${firstShown}</span></span>
      <span class="meta-item">Last: <span>${lastShown}</span></span>
      <span class="creative-id" title="${ad.ad_creative_id}">${ad.ad_creative_id}</span>
    </div>
    <span class="toggle-icon">▾</span>
  `;
  header.addEventListener('click', () => {
    card.classList.toggle('expanded');
  });

  // ── body ──
  const body = document.createElement('div');
  body.className = 'card-body';

  // creatives
  const creativesSec = document.createElement('div');
  creativesSec.className = 'creatives-section';
  creativesSec.innerHTML = `<div class="section-label">Ad Creatives (${creatives.length})</div>`;
  const creativesList = document.createElement('div');
  creativesList.className = 'creatives-list';

  creatives.forEach(c => {
    const vid   = c.VideoId;
    const thumb = thumbUrl(vid);
    const dur   = c.video_duration || '';
    const title = c.VideoTitle || c.headline || '—';
    const views = c.Views ? fmtViews(c.Views) : '';
    const delta = c.ViewsDelta ? `+${fmtViews(c.ViewsDelta)}` : '';
    const cta   = c.call_to_action || '';
    const snip  = c.snippet || c.visible_link || '';
    const url   = c.VideoUrl || c.link || '#';

    const item = document.createElement('a');
    item.className = 'creative-item';
    item.href = url;
    item.target = '_blank';
    item.rel = 'noopener';
    item.innerHTML = `
      <div class="thumb-wrap">
        ${thumb ? `<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        ${dur ? `<span class="thumb-duration">${dur}</span>` : ''}
      </div>
      <div class="creative-info">
        <div class="creative-title">${title}</div>
        <div class="creative-row">
          ${views ? `<span class="creative-tag">Views <span class="views-val">${views}</span>${delta ? ` <span class="creative-tag">(${delta})</span>` : ''}</span>` : ''}
          ${snip  ? `<span class="creative-tag">Link <span class="val">${snip}</span></span>` : ''}
        </div>
        ${cta ? `<span class="creative-cta">${cta}</span>` : ''}
      </div>
    `;
    creativesList.appendChild(item);
  });

  creativesSec.appendChild(creativesList);

  // regions
  const regionsSec = document.createElement('div');
  regionsSec.className = 'regions-section';
  regionsSec.innerHTML = `<div class="section-label">Regions (${regions.length})</div>`;
  const regionsList = document.createElement('div');
  regionsList.className = 'regions-list';

  // sort: regions with impressions first, then alphabetical
  const sortedRegions = [...regions].sort((a, b) => {
    const ai = a.times_shown ? 1 : 0;
    const bi = b.times_shown ? 1 : 0;
    if (bi - ai !== 0) return bi - ai;
    return a.region_name.localeCompare(b.region_name);
  });

  sortedRegions.forEach(r => {
    const first = r.first_shown ? fmtRegDate(r.first_shown) : null;
    const last  = r.last_shown  ? fmtRegDate(r.last_shown)  : null;
    let dateHtml;
    if (first && last && first !== last) {
      dateHtml = `<span class="region-dates">${first} – ${last}</span>`;
    } else if (last) {
      dateHtml = `<span class="region-dates"><span class="one-day">${last}</span></span>`;
    } else {
      dateHtml = `<span class="region-dates">—</span>`;
    }

    const impHtml = r.times_shown
      ? `<span class="region-impressions">${r.times_shown} impr.</span>`
      : `<span class="region-impressions-placeholder"></span>`;

    const row = document.createElement('div');
    row.className = 'region-row';
    row.innerHTML = `
      <span class="region-name">${r.region_name}</span>
      ${dateHtml}
      ${impHtml}
    `;
    regionsList.appendChild(row);
  });

  regionsSec.appendChild(regionsList);

  // links row
  const linksRow = document.createElement('div');
  linksRow.className = 'card-links';
  linksRow.innerHTML = `
    <a class="card-link" href="${ad.details_link}" target="_blank" rel="noopener">Google Ads Transparency ↗</a>
  `;

  body.appendChild(creativesSec);
  body.appendChild(regionsSec);
  body.appendChild(linksRow);

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

// ── populate filters ─────────────────────────────────────────────────────
function populateFilters() {
  const advertisers = [...new Map(allAds.map(a => [a.advertiser_id, a.advertiser])).entries()];
  advertisers.forEach(([id, name]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = advertiserShort(name);
    fAdvertiser.appendChild(opt);
  });

  const regionSet = new Set();
  allAds.forEach(ad => {
    (ad.AdDetails?.search_information?.regions || []).forEach(r => regionSet.add(r.region_name));
  });
  [...regionSet].sort().forEach(rn => {
    const opt = document.createElement('option');
    opt.value = rn;
    opt.textContent = rn;
    fRegion.appendChild(opt);
  });

  allAds.forEach(ad => {
    const opt = document.createElement('option');
    opt.value = ad.ad_creative_id;
    // use first creative title if available
    const firstCreative = (ad.AdDetails?.ad_creatives || []).find(c => c.VideoTitle);
    opt.textContent = firstCreative ? firstCreative.VideoTitle.slice(0,50) : ad.ad_creative_id.slice(0,20);
    fCreative.appendChild(opt);
  });
}

// ── stat bar ─────────────────────────────────────────────────────────────
function buildStatBar() {
  const totalRegions = new Set();
  let totalDays = 0;
  const videoSet = new Set();

  allAds.forEach(ad => {
    totalDays += ad.total_days_shown || 0;
    (ad.AdDetails?.search_information?.regions || []).forEach(r => totalRegions.add(r.region_name));
    (ad.AdDetails?.ad_creatives || []).forEach(c => { if (c.VideoId) videoSet.add(c.VideoId); });
  });

  const advertisers = new Set(allAds.map(a => a.advertiser_id));

  statBar.innerHTML = `
    <span class="stat-item">Advertisers <span class="sv">${advertisers.size}</span></span>
    <span class="stat-item">Creatives <span class="sv">${allAds.length}</span></span>
    <span class="stat-item">Countries <span class="sv">${totalRegions.size}</span></span>
    <span class="stat-item">Total Ad Days <span class="sv">${totalDays}</span></span>
    <span class="stat-item">Unique Videos <span class="sv">${videoSet.size}</span></span>
  `;
}

// ── event listeners ───────────────────────────────────────────────────────
fAdvertiser.addEventListener('change', applyFilters);
fRegion.addEventListener('change', applyFilters);
fCreative.addEventListener('change', applyFilters);
fSearch.addEventListener('input', applyFilters);
btnClear.addEventListener('click', () => {
  fAdvertiser.value = '';
  fRegion.value = '';
  fCreative.value = '';
  fSearch.value = '';
  applyFilters();
});

// ── init ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(DATA_URL);
    allAds = await res.json();
    if (!Array.isArray(allAds)) allAds = [allAds];
    populateFilters();
    buildStatBar();
    filtered = [...allAds];
    renderCards();
    updateCount();
  } catch (err) {
    mainEl.innerHTML = `<div class="empty">Failed to load ad data: ${err.message}</div>`;
    headerCount.textContent = 'Error';
  }
}

init();
</script>
